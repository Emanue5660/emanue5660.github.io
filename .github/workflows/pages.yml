name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A86D1C: ${{ secrets.A86D1C }}
          B7617A: ${{ secrets.B7617A }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A86D1C', '')
          meta_b = os.environ.get('B7617A', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 9fdacf16e9465ef66cc2ad3be99ccf273ed1925a -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 5aeeafea1acff4d75a220c50864ae05fd5 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
